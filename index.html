<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黛兒塔羅占卜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

<!-- Global starfield (all tabs) -->
<div id="global-stars"></div>
<script>
;(function(){
  const el = document.getElementById('global-stars')
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('span')
    const w   = (Math.random() * 2 + 0.8).toFixed(1)
    const x   = (Math.random() * 100).toFixed(1)
    const y   = (Math.random() * 100).toFixed(1)
    const dur = (Math.random() * 4 + 2.5).toFixed(1)
    const del = (Math.random() * 5).toFixed(1)
    const op  = (Math.random() * 0.5 + 0.18).toFixed(2)
    s.style.cssText = `width:${w}px;height:${w}px;left:${x}%;top:${y}%;--dur:${dur}s;--del:${del}s;--op:${op};`
    el.appendChild(s)
  }
})()
</script>

<div id="app">

  <!-- Loading overlay -->
  <div class="loading-overlay" v-if="loading">
    <div class="spinner"></div>
    <span>讀取牌卡中…</span>
  </div>

  <!-- Missing cards dialog -->
  <div class="missing-overlay" v-if="showMissing">
    <div class="missing-modal">
      <div class="missing-header">⚠ 以下 {{ missingCards.length }} 張牌找不到圖片</div>
      <div class="missing-body">
        <div v-for="id in missingCards" :key="id" class="missing-item">
          <span class="m-id">{{ id }}</span>
          <span class="m-zh">{{ id === 'back' ? '牌背' : (CARDS.find(c=>c.id===id)?.zh ?? '') }}</span>
          <span class="m-en">{{ id === 'back' ? 'Card Back' : (CARDS.find(c=>c.id===id)?.en ?? '') }}</span>
        </div>
      </div>
      <div class="missing-footer">
        <button class="btn-confirm" @click="showMissing = false">確認</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="header"><h1>✦ 黛兒塔羅占卜 ✦</h1></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn" :class="{active: tab==='daily'}"   @click="tab='daily'">每日運勢</button>
    <button class="tab-btn" :class="{active: tab==='draw'}"    @click="tab='draw'">塔羅占卜</button>
    <button class="tab-btn" :class="{active: tab==='spread'}"  @click="tab='spread'">牌陣占卜</button>
    <button class="tab-btn" :class="{active: tab==='gallery'}" @click="tab='gallery'">偉特塔羅牌</button>
  </div>

  <!-- Content -->
  <div class="content" v-if="!loading">
    <daily-tab   v-if="tab==='daily'"   :cards="CARDS" :card-exts="cardExts"></daily-tab>
    <draw-tab    v-if="tab==='draw'"    :cards="CARDS" :card-exts="cardExts"></draw-tab>
    <spread-tab  v-if="tab==='spread'"  :cards="CARDS" :card-exts="cardExts" :spreads="SPREADS"></spread-tab>
    <gallery-tab v-if="galleryMounted" v-show="tab==='gallery'" :cards="CARDS" :card-exts="cardExts"></gallery-tab>
  </div>

</div>

<script src="cards-data.js"></script>
<script src="tabs/gallery.js"></script>
<script src="tabs/draw.js"></script>
<script src="tabs/daily.js"></script>
<script src="tabs/spread.js"></script>
<script src="app.js"></script>
</body>
</html>
